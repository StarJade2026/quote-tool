<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库报价速填 · 地面产品报价器</title>
    <link rel="stylesheet" href="../shared/shared.css">
</head>
<body>
    <div style="max-width: 1000px; margin: 20px auto; padding: 20px; font-family: sans-serif;">
        <h1>🏭 仓库报价速填</h1>
        <p>按三层结构填写您的仓库报价，生成专业报价单。</p>
        
        <div style="background: #f0f7ff; padding: 15px; border-radius: 8px; margin: 20px 0;">
            <strong>供应商信息</strong><br><br>
            <label>名称：<input type="text" id="supplierName" placeholder="如：壮力仓库" style="width: 200px;"></label>
            <label>联系人：<input type="text" id="contactPerson" placeholder="姓名" style="width: 150px;"></label>
            <label>电话：<input type="text" id="contactPhone" placeholder="手机号" style="width: 150px;"></label>
            <br><br>
            <label>服务地点：<input type="text" id="serviceLocation" placeholder="如：上海洋山港" style="width: 300px;"></label>
            <label>有效期至：<input type="date" id="validUntil"></label>
        </div>

        <h2>💰 费用明细（三层价格）</h2>
        <p style="color: #666;">P1固定附加费不可删除，P2增值服务点击展开</p>
        
        <div id="feeTablesContainer">
            <!-- 费用表格将通过 JavaScript 动态生成，这里先留空 -->
            <p>加载费用库中...</p>
        </div>

        <div style="margin-top: 30px;">
            <button onclick="previewPDF()">📄 预览报价单</button>
            <button onclick="copySummary()">📋 复制报价摘要</button>
            <button onclick="generateShareLink()">🔗 生成分享链接</button>
        </div>
    </div>

    <!-- 引用公共组件 -->
    <script src="../shared/fee-library.js"></script>
    <script>
        // 临时测试脚本，验证费用库是否加载成功
        console.log('费用库加载:', typeof FEE_LIBRARY);
        document.getElementById('feeTablesContainer').innerHTML = '<p style="color:green;">✅ 费用库加载成功！</p>';
    </script>
</body>
</html>
