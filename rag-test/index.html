<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG知识圈 · 内部智库验证</title>
<style>
  :root {
    --bg: #f5f6fa;
    --card-bg: #fff;
    --text: #2c3e50;
    --border: #dcdde1;
    --blue: #3498db;
    --green: #27ae60;
    --orange: #f39c12;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; }
  .container { max-width:900px; margin:0 auto; padding:20px; }
  .header { text-align:center; padding:20px 0; }
  .header h1 { font-size:22px; }
  .header .sub { color:#7f8c8d; font-size:13px; margin-top:4px; }

  .card { background:var(--card-bg); border-radius:10px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .card h2 { font-size:16px; margin-bottom:10px; }

  /* 搜索框 */
  .search-row { display:flex; gap:10px; }
  .search-row input { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; }
  .search-row button { padding:10px 20px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer; }
  .search-row button:hover { opacity:0.9; }

  /* 结果 */
  .result-item { padding:14px; margin-bottom:10px; border-left:4px solid var(--blue); background:#f8f9fb; border-radius:0 8px 8px 0; }
  .result-item .score { font-size:11px; color:var(--orange); float:right; }
  .result-item .source { font-size:12px; color:#7f8c8d; margin-bottom:6px; }
  .result-item .snippet { font-size:14px; }
  .result-item .snippet mark { background:#fff3cd; padding:1px 3px; border-radius:2px; }

  .empty { text-align:center; color:#95a5a6; padding:30px; }

  .stats { font-size:12px; color:#7f8c8d; text-align:center; margin-top:12px; }
  .meta { text-align:center; font-size:11px; color:#bdc3c7; padding:16px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧠 RAG知识圈 · 内部智库验证</h1>
    <div class="sub">语料库：3篇内部文章｜纯前端检索｜零API调用</div>
  </div>

  <div class="card">
    <h2>🔍 检索测试</h2>
    <div class="search-row">
      <input type="text" id="queryInput" placeholder="输入问题，如：什么是三段法？怎么申请MTO资质？" onkeydown="if(event.key==='Enter')search();">
      <button onclick="search()">检索</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="card">
    <h2>📋 检索结果</h2>
    <div id="results"><div class="empty">👆 输入问题，开始检索内部智库</div></div>
  </div>

  <div class="meta">
    RAG原型 v0.1｜语料：Julia公众号文章3篇｜数据不出浏览器
  </div>
</div>

<script>

// ========== 分词器（简易中文分词） ==========
function tokenize(text) {
  // 去掉标点，按空格/换行/常用分隔符切分
  var cleaned = text.toLowerCase()
    .replace(/[，。、《》？；：""''！（）—…\n\r\.\,\?\!;:"'\(\)\[\]\/\\]/g, ' ')
    .replace(/\s+/g, ' ');
  
  // 提取1-gram（单字）和2-gram（双字组合）混合
  var words = cleaned.split(' ').filter(function(w) { return w.length > 0; });
  var tokens = [];
  
  words.forEach(function(w) {
    if (w.length <= 3) {
      tokens.push(w);
    } else {
      // 长词拆成2-gram
      for (var i = 0; i < w.length - 1; i++) {
        tokens.push(w.substring(i, i+2));
      }
      // 也保留整个词
      tokens.push(w);
    }
  });
  
  return tokens;
}

// ========== BM25风格的相关性评分 ==========
function scoreChunk(queryTokens, chunkTokens) {
  var score = 0;
  var matchedTokens = {};
  
  queryTokens.forEach(function(qt) {
    if (matchedTokens[qt]) return; // 不重复计分
    var countInChunk = 0;
    chunkTokens.forEach(function(ct) {
      if (ct === qt) countInChunk++;
    });
    if (countInChunk > 0) {
      score += Math.log(1 + countInChunk);
      matchedTokens[qt] = true;
    }
  });
  
  // 加分：如果chunk的keywords字段匹配
  return score;
}

function scoreByKeywords(queryTokens, keywordStr) {
  if (!keywordStr) return 0;
  var kwTokens = tokenize(keywordStr);
  var matchCount = 0;
  queryTokens.forEach(function(qt) {
    kwTokens.forEach(function(kt) {
      if (kt === qt) matchCount++;
    });
  });
  return matchCount * 0.5; // keyword匹配权重稍低
}

// ========== 主检索函数 ==========
function search() {
  var query = document.getElementById('queryInput').value.trim();
  if (!query) return;
  
  var startTime = performance.now();
  var queryTokens = tokenize(query);
  
  var allResults = [];
  
  CORPUS.forEach(function(doc) {
    doc.chunks.forEach(function(chunk, idx) {
      var chunkTokens = tokenize(chunk.text);
      var textScore = scoreChunk(queryTokens, chunkTokens);
      var kwScore = scoreByKeywords(queryTokens, chunk.keywords);
      var totalScore = textScore + kwScore;
      
      if (totalScore > 0) {
        allResults.push({
          docId: doc.id,
          docTitle: doc.title,
          docDate: doc.date,
          chunkIndex: idx,
          text: chunk.text,
          score: totalScore
        });
      }
    });
  });
  
  // 按分数降序排列
  allResults.sort(function(a, b) { return b.score - a.score; });
  
  // 取Top 5
  var topResults = allResults.slice(0, 5);
  
  renderResults(topResults, queryTokens, query, performance.now() - startTime);
}

function renderResults(results, queryTokens, query, elapsed) {
  var container = document.getElementById('results');
  var stats = document.getElementById('stats');
  
  if (results.length === 0) {
    container.innerHTML = '<div class="empty">😕 未找到相关内容<br><small>试试换个关键词，如："三段法"、"MTO资质"、"直客操作"</small></div>';
    stats.textContent = '检索完成，0条结果（' + elapsed.toFixed(0) + 'ms）';
    return;
  }
  
  var html = '';
  results.forEach(function(r) {
    // 高亮匹配词
    var snippet = r.text;
    queryTokens.forEach(function(qt) {
      if (qt.length < 2) return;
      var regex = new RegExp(qt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      snippet = snippet.replace(regex, '<mark>$&</mark>');
    });
    
    // 截断过长文本
    if (snippet.length > 300) {
      snippet = snippet.substring(0, 300) + '...';
    }
    
    html += '<div class="result-item">' +
      '<span class="score">相关性 ' + r.score.toFixed(1) + '</span>' +
      '<div class="source">📄 ' + r.docTitle + '（' + r.docDate + '）· 片段' + (r.chunkIndex + 1) + '</div>' +
      '<div class="snippet">' + snippet + '</div>' +
      '</div>';
  });
  
  container.innerHTML = html;
  stats.textContent = '检索完成，' + results.length + '条结果（共' + CORPUS.reduce(function(s,d){return s+d.chunks.length;},0) + '个片段，耗时' + elapsed.toFixed(0) + 'ms）';
}

// 启动时随机显示一个提示
(function() {
  var tips = [
    '试试问："什么是三段法？"',
    '试试问："怎么申请MTO资质？"',
    '试试问："疫情对海运有什么影响？"',
    '试试问："直客和指定货操作有什么区别？"',
    '试试问："物流数字化的四个阶段是什么？"'
  ];
  var tip = tips[Math.floor(Math.random() * tips.length)];
  document.getElementById('queryInput').placeholder = tip;
})();
</script>
</body>
