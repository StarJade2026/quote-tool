<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG知识圈 · 内部智库 v0.2</title>
<style>
  :root {
    --bg: #f5f6fa;
    --card-bg: #fff;
    --text: #2c3e50;
    --border: #dcdde1;
    --blue: #3498db;
    --green: #27ae60;
    --orange: #f39c12;
    --red: #e74c3c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; }
  .container { max-width:900px; margin:0 auto; padding:20px; }
  .header { text-align:center; padding:20px 0; }
  .header h1 { font-size:22px; }
  .header .sub { color:#7f8c8d; font-size:13px; margin-top:4px; }

  .card { background:var(--card-bg); border-radius:10px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .card h2 { font-size:16px; margin-bottom:10px; }

  .search-row { display:flex; gap:10px; }
  .search-row input { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; }
  .search-row button { padding:10px 20px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer; white-space:nowrap; }
  .search-row button:hover { opacity:0.9; }
  .search-row button:disabled { background:#bdc3c7; cursor:not-allowed; }

  .result-item { padding:14px; margin-bottom:10px; border-left:4px solid var(--blue); background:#f8f9fb; border-radius:0 8px 8px 0; }
  .result-item .score { font-size:11px; color:var(--orange); float:right; }
  .result-item .source { font-size:12px; color:#7f8c8d; margin-bottom:6px; }
  .result-item .snippet { font-size:14px; }
  .result-item .snippet mark { background:#fff3cd; padding:1px 3px; border-radius:2px; }

  .generated-answer { background:#f0f7ff; border-left:4px solid var(--green); padding:16px; border-radius:0 8px 8px 0; margin-top:12px; font-size:14px; line-height:1.8; }
  .generated-answer .ref { font-size:11px; color:#7f8c8d; margin-top:8px; border-top:1px solid var(--border); padding-top:8px; }

  .empty { text-align:center; color:#95a5a6; padding:30px; }
  .stats { font-size:12px; color:#7f8c8d; text-align:center; margin-top:12px; }
  .meta { text-align:center; font-size:11px; color:#bdc3c7; padding:16px 0; }
  .error-msg { color:var(--red); font-size:13px; padding:10px; background:#fdf2f2; border-radius:6px; margin-top:10px; }
  .loading { text-align:center; padding:15px; color:#7f8c8d; }
</style>
</head>
<body>
<div class="container">

    <h1>🧠 RAG知识圈 · 内部智库 v0.2</h1>
    <div class="sub">语料库：4篇内部文章｜检索 + AI生成｜基于专属知识库</div>
  </div>

  <div class="card">
    <h2>🔍 提出问题</h2>

      <button onclick="search()" id="btnSearch">🔍 检索</button>
      <button onclick="generate()" id="btnGenerate" disabled>✨ AI生成回答</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="card">
    <h2>📋 结果</h2>

  </div>

  <div class="meta">
    RAG原型 v0.2｜专属智库 · 数据不出浏览器 · 生成调用DeepSeek
  </div>
</div>

// ========== 分词器 ==========
function tokenize(text) {
  var cleaned = text.toLowerCase()
    .replace(/[，。、《》？；：""''！（）—…\n\r\.\,\?\!;:"'\(\)\[\]\/\\]/g, ' ')
    .replace(/\s+/g, ' ');
  var words = cleaned.split(' ').filter(function(w) { return w.length > 0; });
  var tokens = [];
  words.forEach(function(w) {
    if (w.length <= 3) { tokens.push(w); }
    else {
      for (var i = 0; i < w.length - 1; i++) { tokens.push(w.substring(i, i+2)); }
      tokens.push(w);
    }
  });
  return tokens;
}

function scoreChunk(queryTokens, chunkTokens) {
  var score = 0, matched = {};
  queryTokens.forEach(function(qt) {
    if (matched[qt]) return;
    var cnt = 0;
    chunkTokens.forEach(function(ct) { if (ct === qt) cnt++; });
    if (cnt > 0) { score += Math.log(1 + cnt); matched[qt] = true; }
  });
  return score;
}

function scoreByKeywords(queryTokens, kwStr) {
  if (!kwStr) return 0;
  var kwTokens = tokenize(kwStr), match = 0;
  queryTokens.forEach(function(qt) {
    kwTokens.forEach(function(kt) { if (kt === qt) match++; });
  });
  return match * 0.5;
}

// ========== 检索 ==========
function search() {
  var query = document.getElementById('queryInput').value.trim();
  if (!query) return;
  var startTime = performance.now();
  var queryTokens = tokenize(query);
  var allResults = [];

  CORPUS.forEach(function(doc) {
    doc.chunks.forEach(function(chunk, idx) {
      var chunkTokens = tokenize(chunk.text);
      var textScore = scoreChunk(queryTokens, chunkTokens);
      var kwScore = scoreByKeywords(queryTokens, chunk.keywords);
      var totalScore = textScore + kwScore;
      if (totalScore > 0) {
        allResults.push({ docId: doc.id, docTitle: doc.title, docDate: doc.date, chunkIndex: idx, text: chunk.text, score: totalScore });
      }
    });
  });

  allResults.sort(function(a, b) { return b.score - a.score; });
  lastSearchResults = allResults.slice(0, 5);
  renderSearchResults(queryTokens, performance.now() - startTime);
  document.getElementById('btnGenerate').disabled = (lastSearchResults.length === 0);
}

function renderSearchResults(queryTokens, elapsed) {
  var container = document.getElementById('results');
  var stats = document.getElementById('stats');
  if (lastSearchResults.length === 0) {
    container.innerHTML = '<div class="empty">😕 未找到相关内容</div>';
    stats.textContent = '检索完成，0条结果（' + elapsed.toFixed(0) + 'ms）';
    return;
  }
  var html = '';
  lastSearchResults.forEach(function(r) {
    var snippet = r.text;
    queryTokens.forEach(function(qt) {
      if (qt.length < 2) return;
      var regex = new RegExp(qt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      snippet = snippet.replace(regex, '<mark>$&</mark>');
    });
    if (snippet.length > 250) snippet = snippet.substring(0, 250) + '...';
    html += '<div class="result-item">' +
      '<span class="score">相关性 ' + r.score.toFixed(1) + '</span>' +
      '<div class="source">📄 ' + r.docTitle + '（' + r.docDate + '）· 片段' + (r.chunkIndex + 1) + '</div>' +
      '<div class="snippet">' + snippet + '</div></div>';
  });
  container.innerHTML = html;
  stats.textContent = '检索完成，' + lastSearchResults.length + '条结果（' + elapsed.toFixed(0) + 'ms）｜点击"AI生成回答"获取整合答案';
}

// ========== 生成 ==========
function generate() {
  if (lastSearchResults.length === 0) return;
  var query = document.getElementById('queryInput').value.trim();
  
  var container = document.getElementById('results');
  var loadingDiv = document.createElement('div');
  loadingDiv.className = 'loading';
  loadingDiv.textContent = '⏳ 正在基于内部知识库生成回答...';
  container.appendChild(loadingDiv);

  var btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';

  // 构建上下文
  var contextParts = [];
  lastSearchResults.forEach(function(r, i) {
    contextParts.push('【来源' + (i+1) + '】《' + r.docTitle + '》（' + r.docDate + '）：' + r.text);
  });
  var context = contextParts.join('\n\n');

  var systemPrompt = '你是Julia的内部智库助手。你只能基于下面提供的知识片段来回答问题，不能编造或使用外部知识。' +
    '如果片段中有明确的操作步骤、方法论、案例，请直接引用。回答要专业、简洁、有条理，保持与Julia公众号文章一致的"说人话"风格。' +
    '回答末尾请标注引用了哪几个来源（用【来源1】【来源2】标注）。';

  fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: '知识片段：\n\n' + context + '\n\n用户问题：' + query }
      ],
      temperature: 0.3,
      max_tokens: 1500
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    var answer = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '（未获取到回答内容）';
    
    // 构建引用来源
    var refs = [];
    lastSearchResults.forEach(function(r, i) {
      refs.push('【来源' + (i+1) + '】《' + r.docTitle + '》片段' + (r.chunkIndex + 1));
    });

    var answerHTML = '<div class="generated-answer">' +
      '<div style="font-weight:600;color:var(--green);margin-bottom:8px;">🤖 基于内部知识库的AI回答</div>' +
      '<div>' + answer.replace(/\n/g, '<br>') + '</div>' +
      '<div class="ref">📚 引用来源：' + refs.join('；') + '</div></div>';

    // 移除loading，追加回答
    if (loadingDiv.parentNode) loadingDiv.parentNode.removeChild(loadingDiv);
    container.insertAdjacentHTML('beforeend', answerHTML);
  })
  .catch(function(err) {
    if (loadingDiv.parentNode) loadingDiv.parentNode.removeChild(loadingDiv);
    var errHTML = '<div class="error-msg">❌ 生成失败：' + err.message + '<br><small>请检查API代理层配置或稍后重试</small></div>';
    container.insertAdjacentHTML('beforeend', errHTML);
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = '✨ AI生成回答';
  });
}

// ========== 启动 ==========
(function() {
  var tips = [
    '试试问："什么是三段法？"',
    '试试问："怎么考核操作员？"',
    '试试问："报价和别人的有什么区别？"',
    '试试问："直客和指定货操作有什么区别？"',
    '试试问："多式联运有什么陷阱？"'
  ];
  document.getElementById('queryInput').placeholder = tips[Math.floor(Math.random() * tips.length)];
})();
</script>
</body>
