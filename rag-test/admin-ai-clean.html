<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI清洗工具 · 海外代理数据</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f5f6fa; --card-bg: #fff; --text: #2c3e50;
    --border: #dcdde1; --blue: #3498db; --green: #27ae60;
    --red: #e74c3c; --orange: #f39c12;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; }
  .container { max-width:1100px; margin:0 auto; padding:20px; }
  .header { text-align:center; padding:20px 0; }
  .header h1 { font-size:22px; }
  .header .sub { color:#7f8c8d; font-size:13px; margin-top:4px; }

  .card { background:var(--card-bg); border-radius:10px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .card h2 { font-size:16px; margin-bottom:12px; }

  .upload-zone {
    border:2px dashed var(--border); border-radius:10px;
    padding:30px; text-align:center; cursor:pointer;
    transition: all 0.2s; margin-bottom:16px;
  }
  .upload-zone:hover { border-color: var(--blue); background:#f0f7ff; }
  .upload-zone.dragover { border-color: var(--green); background:#f0fff4; }
  .upload-zone input { display:none; }

  button {
    padding:10px 20px; background:var(--blue); color:#fff;
    border:none; border-radius:8px; font-size:14px; cursor:pointer; margin:4px;
  }
  button:hover { opacity:0.9; }
  button:disabled { background:#bdc3c7; cursor:not-allowed; }
  button.green { background:var(--green); }
  button.red { background:var(--red); }

  .status { font-size:13px; color:#7f8c8d; margin-top:8px; padding:8px; background:#f8f9fb; border-radius:6px; }
  .status.error { color:var(--red); background:#fdf2f2; }

  .preview-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:10px; }
  .preview-table th, .preview-table td { border:1px solid var(--border); padding:6px 8px; text-align:left; }
  .preview-table th { background:#f0f7ff; font-weight:600; }
  .preview-table td input { width:100%; border:1px solid transparent; padding:2px 4px; font-size:12px; }
  .preview-table td input:focus { border-color:var(--blue); outline:none; }

  .btn-group { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }

  .meta { text-align:center; font-size:11px; color:#bdc3c7; padding:16px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧹 AI清洗工具 · 海外代理数据</h1>
    <div class="sub">上传Excel → AI自动清洗 → 下载完整版 / 入库脱敏版</div>
  </div>

  <div class="card">
    <h2>📤 上传原始Excel</h2>
    <div class="upload-zone" id="dropZone">
      <div style="font-size:32px;margin-bottom:8px;">📁</div>
      <div>点击选择文件，或拖拽Excel文件到这里</div>
      <div style="font-size:11px;color:#95a5a6;margin-top:4px;">支持 .xlsx / .xls</div>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
    </div>
    <div class="status" id="status">等待上传文件...</div>
  </div>

  <div class="card" id="previewCard" style="display:none;">
    <h2>🔍 清洗预览（可编辑）</h2>
    <div style="max-height:400px;overflow-y:auto;">
      <table class="preview-table" id="previewTable"></table>
    </div>
    <div class="btn-group">
      <button class="green" onclick="downloadFull()">📥 下载完整版（含联系方式）</button>
      <button onclick="importToRAG()">📚 入库脱敏版（去联系方式）</button>
    </div>
  </div>

  <div class="meta">
    数据清洗流程：原始文件保留 → AI清洗 → 完整版下载 → 脱敏版入库
  </div>
</div>

<script>
const WORKER_URL = 'https://api-proxy.rainbowway-api.workers.dev/v1/chat/completions';
const MODEL = 'deepseek-chat';
let cleanedData = [];
let rawText = '';
let originalFileName = '';

// ========== 文件上传 ==========
document.getElementById('dropZone').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', function(e) {
  handleFile(e.target.files[0]);
});
document.getElementById('dropZone').addEventListener('dragover', function(e) {
  e.preventDefault();
  this.classList.add('dragover');
});
document.getElementById('dropZone').addEventListener('dragleave', function() {
  this.classList.remove('dragover');
});
document.getElementById('dropZone').addEventListener('drop', function(e) {
  e.preventDefault();
  this.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file) return;
  if (!file.name.match(/\.xlsx?$/i)) {
    setStatus('❌ 请上传 .xlsx 或 .xls 文件', 'error');
    return;
  }
  originalFileName = file.name;
  setStatus('📖 正在读取文件：' + file.name + '（' + (file.size/1024).toFixed(1) + 'KB）...');

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, { type: 'array' });
      var firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
      
      if (rows.length === 0) {
        setStatus('❌ Excel文件为空', 'error');
        return;
      }

      rawText = JSON.stringify(rows, null, 2);
      setStatus('✅ 文件读取成功，共 ' + rows.length + ' 行。正在调用AI清洗...');
      callAIClean(rows);
    } catch(err) {
      setStatus('❌ 文件解析失败：' + err.message, 'error');
    }
  };
  reader.onerror = function() {
    setStatus('❌ 文件读取失败', 'error');
  };
  reader.readAsArrayBuffer(file);
}

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

// ========== AI清洗 ==========
function callAIClean(rows) {
    var systemPrompt = '你是货代行业数据清洗专家。请将原始Excel数据整理成一份完整的代理公司清单。\n' +
    '规则：\n' +
    '1. 为每一行数据生成一条完整记录\n' +
    '2. 将所有能找到的信息都保留下来，不要遗漏任何内容\n' +
    '3. 生成固定字段：公司名、国家、联系人、电话、邮箱、完整信息\n' +
    '4. "完整信息"字段包含该行所有原始内容的自然语言描述，例如：\n' +
    '   "位于新加坡，联系人Cleo Tan担任助理客服经理，电话+65 6542 8081，邮箱见原始记录，主营海运和空运"\n' +
    '5. 电话和邮箱如果有请填，没有就留空\n' +
    '6. 修复明显乱码\n' +
    '\n输出格式：严格的JSON数组：\n' +
    '[{"company":"","country":"","contact":"","phone":"","email":"","fullInfo":""}]\n' +
    '只返回JSON数组，不要任何其他文字。';

  fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: '原始Excel数据（JSON格式）：\n' + rawText.substring(0, 120000) }
      ],
      temperature: 0.1,
      max_tokens: 8000
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    var content = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
    
    // 提取JSON数组
    var jsonMatch = content.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('AI未返回有效的JSON数组');
    
    cleanedData = JSON.parse(jsonMatch[0]);
    setStatus('✅ AI清洗完成，共 ' + cleanedData.length + ' 条记录。请在下方预览并确认。');
    renderPreview();
  })
  .catch(function(err) {
    setStatus('❌ AI清洗失败：' + err.message + '\n请重试或检查文件格式。', 'error');
  });
}

// ========== 预览表格 ==========
function renderPreview() {
  var card = document.getElementById('previewCard');
  card.style.display = 'block';

  if (cleanedData.length === 0) return;
  var headers = Object.keys(cleanedData[0]);
  var html = '<tr>';
  headers.forEach(function(h) { html += '<th>' + h + '</th>'; });
  html += '</tr>';

  cleanedData.forEach(function(row, i) {
    html += '<tr>';
    headers.forEach(function(h) {
      html += '<td><input value="' + escapeHtml(String(row[h] || '')) + '" data-row="' + i + '" data-field="' + h + '"></td>';
    });
    html += '</tr>';
  });
  document.getElementById('previewTable').innerHTML = html;

  // 绑定编辑事件
  document.querySelectorAll('#previewTable input').forEach(function(input) {
    input.addEventListener('input', function() {
      var row = parseInt(this.getAttribute('data-row'));
      var field = this.getAttribute('data-field');
      if (cleanedData[row]) {
        cleanedData[row][field] = this.value;
      }
    });
  });

  card.scrollIntoView({ behavior: 'smooth' });
}

function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== 下载完整版 ==========
function downloadFull() {
  if (cleanedData.length === 0) return;
  
  // 生成Markdown格式的完整表格
  var headers = Object.keys(cleanedData[0]);
  var md = '| ' + headers.join(' | ') + ' |\n';
  md += '| ' + headers.map(function() { return '---'; }).join(' | ') + ' |\n';
  cleanedData.forEach(function(row) {
    md += '| ' + headers.map(function(h) { return String(row[h] || ''); }).join(' | ') + ' |\n';
  });

  var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = originalFileName.replace(/\.\w+$/, '') + '_完整版.md';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('✅ 完整版已下载（含联系方式），请妥善保存到本地。');
}

// ========== 入库脱敏版 ==========
function importToRAG() {
  if (cleanedData.length === 0) return;

  var corpus = [];
  try {
    var raw = localStorage.getItem('rag_corpus');
    if (raw) corpus = JSON.parse(raw);
  } catch(e) {}

  var now = new Date().toISOString().slice(0, 10);
  var totalChunks = 0;

  cleanedData.forEach(function(row) {
    // 脱敏：去掉电话和邮箱
    var safeRow = {};
    Object.keys(row).forEach(function(key) {
      if (key === 'phone' || key === 'email') {
        safeRow[key] = '（已脱敏）';
      } else {
        safeRow[key] = row[key];
      }
    });

    // 构建可检索文本
    var parts = [];
    if (safeRow.company) parts.push('公司：' + safeRow.company);
    if (safeRow.country) parts.push('国家：' + safeRow.country);
    if (safeRow.city) parts.push('城市：' + safeRow.city);
    if (safeRow.contact) parts.push('联系人：' + safeRow.contact);
    if (safeRow.title) parts.push('职位：' + safeRow.title);
    if (safeRow.bizType) parts.push('业务类型：' + safeRow.bizType);
    if (safeRow.note) parts.push('备注：' + safeRow.note);
    var text = parts.join('\n');
    if (!text.trim()) return;

    var keywords = text.toLowerCase()
      .replace(/[，。、《》？；：""''！（）—…\n\r\.\,\?\!;:"'\(\)\[\]\/\\\d]/g, ' ')
      .split(/\s+/)
      .filter(function(w) { return w.length >= 2; })
      .slice(0, 8)
      .join(' ');

    corpus.push({
      id: 'doc-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
      title: safeRow.company || '未命名',
      date: now,
      chunks: [{ text: text, keywords: keywords }],
      meta: {
        company: safeRow.company,
        country: safeRow.country,
        contact: safeRow.contact
      }
    });
    totalChunks++;
  });

  try {
    localStorage.setItem('rag_corpus', JSON.stringify(corpus));
    setStatus('✅ 入库完成！共 ' + totalChunks + ' 条记录已脱敏存入RAG知识库。');
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      setStatus('⚠️ localStorage空间不足。请先清理部分语料后重试。', 'error');
    } else {
      setStatus('❌ 入库失败：' + e.message, 'error');
    }
  }
}
</script>
</body>
</html>
