<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOT时间引擎 - 物流风险管理</title>
<link rel="stylesheet" href="../shared/SHARED.CSS">
<style>
  :root {
    --red: #e74c3c;
    --yellow: #f39c12;
    --green: #27ae60;
    --bg: #f5f6fa;
    --card-bg: #fff;
    --text: #2c3e50;
    --border: #dcdde1;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; }
  .container { max-width:900px; margin:0 auto; padding:20px; }
  .header { text-align:center; padding:30px 0 20px; }
  .header h1 { font-size:24px; margin-bottom:6px; }
  .header .subtitle { color:#7f8c8d; font-size:14px; }
  
  .card { background:var(--card-bg); border-radius:10px; padding:20px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
  .card h2 { font-size:18px; margin-bottom:12px; border-bottom:2px solid #3498db; padding-bottom:8px; display:inline-block; }
  
  /* 时间轴 */
  .timeline { position:relative; padding-left:30px; }
  .timeline::before { content:''; position:absolute; left:12px; top:0; bottom:0; width:2px; background:var(--border); }
  .tl-node { position:relative; margin-bottom:16px; padding:10px 14px; border-radius:8px; background:#f8f9fa; border-left:3px solid var(--green); }
  .tl-node.warning { border-left-color: var(--yellow); background:#fffbf0; }
  .tl-node.critical { border-left-color: var(--red); background:#fdf2f2; }
  .tl-node::before { content:''; position:absolute; left:-37px; top:14px; width:12px; height:12px; border-radius:50%; background:var(--green); border:2px solid #fff; box-shadow:0 0 0 2px var(--green); }
  .tl-node.warning::before { background:var(--yellow); box-shadow:0 0 0 2px var(--yellow); }
  .tl-node.critical::before { background:var(--red); box-shadow:0 0 0 2px var(--red); }
  .tl-node .node-name { font-weight:600; font-size:15px; }
  .tl-node .node-meta { font-size:13px; color:#7f8c8d; margin-top:4px; }
  .tl-node .node-diff { font-size:12px; margin-top:2px; font-weight:500; }
  
  /* 风险卡片 */
  .risk-list { list-style:none; }
  .risk-list li { padding:10px 14px; margin-bottom:8px; border-radius:6px; font-size:14px; }
  .risk-list .risk-high { background:#fde8e8; border-left:4px solid var(--red); }
  .risk-list .risk-mid { background:#fef3cd; border-left:4px solid var(--yellow); }
  .risk-list .risk-low { background:#e8f5e9; border-left:4px solid var(--green); }
  
  .meta-bar { text-align:center; font-size:12px; color:#95a5a6; padding:20px 0; }
  .btn { display:inline-block; padding:10px 24px; background:#3498db; color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer; margin:4px; text-decoration:none; }
  .btn:hover { background:#2980b9; }
  .btn-back { background:#7f8c8d; }
  .btn-back:hover { background:#6c7a7a; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⏱ MOT时间引擎</h1>
    <p class="subtitle" id="subtitle">基于道瑞SOP · 时间风险管理 v0.2</p>
  </div>

  <div class="card" id="workflowInfo">
    <h2>📋 当前流转单</h2>
    <div id="wfDetail">加载中...</div>
  </div>

  <div class="card">
    <h2>🕐 时间轴</h2>
    <div class="timeline" id="timeline">加载中...</div>
  </div>

  <div class="card">
    <h2>⚠️ 风险提示</h2>
    <ul class="risk-list" id="riskList">加载中...</ul>
  </div>

  <div style="text-align:center;margin-top:16px;">
    <a href="../workflow/" class="btn btn-back">← 返回流转单</a>
  </div>

  <div class="meta-bar">
    当前数据版本：v0.2｜节点链引擎基于道瑞SOP 2026Q1版｜支持出口FCL+进口FCL
  </div>
</div>

<script src="mot-engine.js"></script>
<script>
(function() {
  // ========== 数据加载 ==========
  // 优先从URL参数读取（流转单跳转过来）
  // 否则用本地示例数据（sample-workflow.json）

  function getParam(name) {
    const url = new URL(window.location.href);
    return url.searchParams.get(name);
  }

  const encodedData = getParam('data');
  
  if (encodedData) {
    // 从URL参数解码（流转单跳转过来的真实数据）
    try {
      const jsonStr = decodeURIComponent(encodedData);
      const wfData = JSON.parse(jsonStr);
      runAnalysis(wfData);
    } catch(e) {
      document.getElementById('timeline').innerHTML = 
        '<p style="color:red;padding:20px;">❌ 数据解析失败：' + e.message + '<br><small>请从流转单工具重新跳转</small></p>';
    }
  } else {
    // 没有URL参数，加载本地示例数据
    document.getElementById('subtitle').textContent += ' [示例模式]';
    fetch('sample-workflow.json')
      .then(r => r.json())
      .then(runAnalysis)
      .catch(function(err) {
        document.getElementById('timeline').innerHTML = 
          '<p style="color:#f39c12;padding:20px;">📭 暂无流转单数据<br><small>请从流转单工具点击"时间风险分析"按钮跳转</small></p>';
      });
  }

  function runAnalysis(wfData) {
    const result = motEngine.analyze(wfData);
    render(result);
  }

  function render(result) {
    const wf = result.workflowInfo;
    document.getElementById('wfDetail').innerHTML = 
      '<p><strong>提单号：</strong>' + wf.billNo + 
      ' &nbsp;|&nbsp; <strong>运输模式：</strong>' + wf.mode + 
      ' &nbsp;|&nbsp; <strong>路线：</strong>' + wf.origin + ' → ' + wf.destination + '</p>' +
      '<p style="font-size:13px;color:#7f8c8d;">' +
      (wf.etd ? '开船日：' + wf.etd + ' &nbsp;|&nbsp; ' : '') +
      (wf.eta ? '预计到港：' + wf.eta + ' &nbsp;|&nbsp; ' : '') +
      (wf.terms ? '贸易条款：' + wf.terms : '') +
      '</p>';

    // 时间轴渲染
    var tlHTML = '';
    result.nodes.forEach(function(n) {
      var cls = '';
      if (n.severity === 'critical') cls = 'critical';
      else if (n.severity === 'warning') cls = 'warning';
      
      var diffHTML = '';
      if (n.diffWorkdays !== null && n.diffWorkdays !== undefined) {
        var diffCls = '';
        var sign = n.diffWorkdays > 0 ? '+' : '';
        if (n.severity === 'critical') diffCls = 'style="color:var(--red);font-weight:600;"';
        else if (n.severity === 'warning') diffCls = 'style="color:var(--yellow);font-weight:600;"';
        else diffCls = 'style="color:var(--green);"';
        diffHTML = '<div class="node-diff"' + diffCls + '>偏差：' + sign + n.diffWorkdays + '个工作日（窗口：' + n.stdWindow + '）</div>';
      }
      
      tlHTML += '<div class="tl-node ' + cls + '">' +
        '<div class="node-name">' + n.name + '</div>' +
        '<div class="node-meta">标准：' + n.expectedDate + ' &nbsp;|&nbsp; 实际：' + (n.actualDate || '待确认') + '</div>' +
        diffHTML +
        '</div>';
    });
    document.getElementById('timeline').innerHTML = tlHTML;

    // 风险提示渲染
    var riskHTML = '';
    result.risks.forEach(function(r) {
      var cls = 'risk-low';
      if (r.level === 'high') cls = 'risk-high';
      else if (r.level === 'mid') cls = 'risk-mid';
      riskHTML += '<li class="' + cls + '"><strong>' + r.nodeName + '：</strong>' + r.message + '</li>';
    });
    if (result.risks.length === 0) {
      riskHTML = '<li class="risk-low">✅ 所有节点在标准时间窗口内，暂无风险提示</li>';
    }
    document.getElementById('riskList').innerHTML = riskHTML;
  }
})();
</script>
</body>
</html>
