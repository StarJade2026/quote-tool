<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SOP 流转单数据解析器</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 150px; margin: 10px 0; border-radius: 8px; padding: 12px; border: 1px solid #ddd; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin: 10px 0; }
        .tag { background: #e3f2fd; color: #1565c0; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 4px; }
        .fee-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .fee-table th, .fee-table td { border: 1px solid #e2e8f0; padding: 6px; text-align: left; }
        .section { margin-top: 20px; border-top: 2px solid #2563eb; padding-top: 15px; }
    </style>
</head>
<body>
    <h2>📋 SOP 流转单数据解析器</h2>
    <p>请将从流转单导出的 <code>.sop</code> 文件内容粘贴到下方，点击"解析"，然后截图发给我。</p>
    
    <textarea id="input" placeholder="粘贴 .sop 文件内容..."></textarea>
    <br>
    <button onclick="parseSOP()">🔍 解析</button>
    
    <div id="output"></div>

    <script>
        function escapeHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function parseSOP() {
            const raw = document.getElementById('input').value.trim();
            let data;
            try {
                // 尝试解包（如果是 pako 压缩格式）
                if (raw.startsWith('{')) {
                    data = JSON.parse(raw);
                } else {
                    const binary = atob(raw);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    const jsonStr = pako.ungzip(bytes, { to: 'string' });
                    data = JSON.parse(jsonStr);
                }
            } catch(e) {
                // 如果解压失败，可能是 pako 没有加载，尝试直接解析
                try { data = JSON.parse(raw); } catch(e2) {
                    document.getElementById('output').innerHTML = '<p style="color:red;">解析失败，请确认粘贴的是 .sop 文件的完整内容。</p>';
                    return;
                }
            }
            
            if (!data) return;

            let html = '<div class="section"><h3>📌 项目基础信息</h3>';
            html += `<p><strong>项目：</strong>${escapeHtml(data.projectName||'-')} | <strong>客户：</strong>${escapeHtml(data.customerName||'-')} | <strong>版本：</strong>${escapeHtml(data.version||'-')}</p>`;
            html += `<p><strong>贸易条款：</strong>${escapeHtml(data.tradeTerm||'-')} | <strong>箱型箱量：</strong>${escapeHtml(data.containerInfo||'-')}</p>`;
            html += `<p><strong>段1：</strong>${escapeHtml(data.geo1||'-')} → <strong>段2：</strong>${escapeHtml(data.geo2||'-')} → <strong>段3：</strong>${escapeHtml(data.geo3||'-')}</p>`;
            html += '</div>';

            // 上游委托方
            const upstream = data.upstreamCards || [];
            if (upstream.length > 0) {
                html += '<div class="section"><h3>🧑‍🤝‍🧑 上游委托方</h3>';
                upstream.forEach(c => {
                    html += `<div class="card"><strong>${escapeHtml(c.company||'未命名')}</strong> [${escapeHtml(c.vendor_type||'-')}] [${escapeHtml(c.supplier_relation||'-')}]<br>`;
                    (c.contacts||[]).forEach(con => {
                        html += `联系人：${escapeHtml(con.name||'-')} ${escapeHtml(con.role||'')} ${escapeHtml(con.phone||'')}<br>`;
                    });
                    html += '</div>';
                });
                html += '</div>';
            }

            // 段1供应商
            const seg1 = data.seg1SupplierCards || [];
            if (seg1.length > 0) {
                html += '<div class="section"><h3>🚚 段1 服务供应商</h3>';
                seg1.forEach(c => {
                    html += `<div class="card"><strong>${escapeHtml(c.company||'未命名')}</strong> <span class="tag">${escapeHtml(c.vendor_type||'-')}</span> <span class="tag">${escapeHtml(c.supplier_relation||'-')}</span><br>`;
                    (c.contacts||[]).forEach(con => {
                        html += `联系人：${escapeHtml(con.name||'-')} ${escapeHtml(con.role||'')} ${escapeHtml(con.phone||'')}<br>`;
                    });
                    if (c.fees && c.fees.length > 0) {
                        html += '<table class="fee-table"><tr><th>费用名称</th><th>应付金额</th></tr>';
                        c.fees.forEach(f => html += `<tr><td>${escapeHtml(f.name||'-')}</td><td>${f.amount||0}</td></tr>`);
                        html += '</table>';
                    }
                    html += '</div>';
                });
                html += '</div>';
            }

            // 段3供应商
            const seg3 = data.seg3SupplierCards || [];
            if (seg3.length > 0) {
                html += '<div class="section"><h3>📍 段3 目的地服务方</h3>';
                seg3.forEach(c => {
                    html += `<div class="card"><strong>${escapeHtml(c.company||'未命名')}</strong> <span class="tag">${escapeHtml(c.vendor_type||'-')}</span> <span class="tag">${escapeHtml(c.supplier_relation||'-')}</span><br>`;
                    (c.contacts||[]).forEach(con => {
                        html += `联系人：${escapeHtml(con.name||'-')} ${escapeHtml(con.role||'')} ${escapeHtml(con.phone||'')}<br>`;
                    });
                    html += '</div>';
                });
                html += '</div>';
            }

            // 任务
            if (data.tasks) {
                html += '<div class="section"><h3>📋 任务列表</h3>';
                Object.keys(data.tasks).forEach(seg => {
                    html += `<h4>${seg}</h4><table class="fee-table"><tr><th>状态</th><th>任务</th><th>责任方</th></tr>`;
                    data.tasks[seg].forEach(t => {
                        html += `<tr><td>${t.completed ? '✓' : '○'}</td><td>${escapeHtml(t.name)}</td><td>${escapeHtml(t.responsible)}</td></tr>`;
                    });
                    html += '</table>';
                });
                html += '</div>';
            }

            document.getElementById('output').innerHTML = html;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</body>
</html>
