// ====== 初始化 ======
function init() {
    document.getElementById('totalCount').textContent = contacts.length;
    
    // 填充筛选下拉
    var ports = [...new Set(contacts.map(c => c.port))].sort();
    var routes = [...new Set(contacts.map(c => c.route))].sort();
    var types = [...new Set(contacts.map(c => c.type))].sort();
    
    var portSel = document.getElementById('portFilter');
    ports.forEach(p => { var o = document.createElement('option'); o.value = p; o.textContent = p; portSel.appendChild(o); });
    
    var routeSel = document.getElementById('routeFilter');
    routes.forEach(r => { var o = document.createElement('option'); o.value = r; o.textContent = r; routeSel.appendChild(o); });
    
    var typeSel = document.getElementById('typeFilter');
    types.forEach(t => { var o = document.createElement('option'); o.value = t; o.textContent = t; typeSel.appendChild(o); });
    
    renderTable(contacts);
}

function filterTable() {
    var keyword = document.getElementById('searchInput').value.toLowerCase();
    var port = document.getElementById('portFilter').value;
    var route = document.getElementById('routeFilter').value;
    var type = document.getElementById('typeFilter').value;
    
    var filtered = contacts.filter(function(c) {
        var matchKeyword = !keyword || 
            (c.company && c.company.toLowerCase().indexOf(keyword) > -1) ||
            (c.person && c.person.toLowerCase().indexOf(keyword) > -1) ||
            (c.mobile && c.mobile.indexOf(keyword) > -1) ||
            (c.email && c.email.toLowerCase().indexOf(keyword) > -1) ||
            (c.tel && c.tel.indexOf(keyword) > -1);
        var matchPort = port === '全部' || c.port === port;
        var matchRoute = route === '全部' || c.route === route;
        var matchType = type === '全部' || c.type === type;
        return matchKeyword && matchPort && matchRoute && matchType;
    });
    
    document.getElementById('resultInfo').textContent = '显示 ' + filtered.length + ' / ' + contacts.length + ' 条记录';
    renderTable(filtered);
}

function renderTable(data) {
    var tbody = document.querySelector('#contactTable tbody');
    tbody.innerHTML = '';
    data.forEach(function(c) {
        var tr = document.createElement('tr');
        tr.innerHTML = 
            '<td>' + (c.company || '') + '</td>' +
            '<td><strong>' + (c.person || '') + '</strong></td>' +
            '<td>' + (c.title || '') + '</td>' +
            '<td>' + (c.tel || '') + '</td>' +
            '<td>' + (c.mobile || '') + '</td>' +
            '<td style="font-size:0.8rem;">' + (c.email || '') + '</td>' +
            '<td><span class="tag tag-port">' + (c.port || '') + '</span></td>' +
            '<td><span class="tag tag-route">' + (c.route || '') + '</span></td>' +
            '<td><span class="tag tag-type">' + (c.source || '') + '</span></td>';
        tbody.appendChild(tr);
    });
}

init();
filterTable();
