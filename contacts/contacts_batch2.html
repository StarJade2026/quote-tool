const countries = ['Australia','Azerbaijan','Bangladesh','Belgium','Bulgaria','Cambodia','China','Colombia','Congo','Denmark','Ecuador','El Salvador','Finland','France','Germany','Greece','Hungary','India','Indonesia','Iran','Ireland','Italy','Japan','Jordan','Kuwait','Lithuania','Mexico','Nepal','New Zealand','Panama','Peru','Poland','Romania','Russia','Saudi Arabia','Singapore','South Africa','Spain','Sweden','Switzerland','Syria','Taiwan','Thailand','Turkey','UAE','UK','USA','Vietnam'].filter(Boolean);
const countrySel = document.getElementById('countryFilter');
countries.sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    countrySel.appendChild(opt);
});

let sortCol = 0;
let sortAsc = true;

function render(list) {
    const tbody = document.getElementById('contactsBody');
    tbody.innerHTML = '';
    for (const c of list) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td data-label="公司" class="company">${c.company}</td>
            <td data-label="联系人" class="person">${c.person}</td>
            <td data-label="职位" class="title">${c.title}</td>
            <td data-label="电话" class="tel">${c.tel}</td>
            <td data-label="邮箱" class="email">${c.email ? ('<a href="mailto:' + c.email.replace(/<[^>]+>/g,'') + '">' + c.email.replace(/<[^>]+>/g,'') + '</a>') : ''}</td>
            <td data-label="所在地" class="location">${c.location}</td>
            <td data-label="国家"><span class="country-tag">${c.country}</span></td>
            <td data-label="类型"><span class="type-tag">${c.type}</span></td>`;
        tbody.appendChild(tr);
    }
    document.getElementById('countDisplay').textContent = `共 ${list.length} 条`;
}

function filter() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cf = document.getElementById('countryFilter').value;
    let filtered = contacts;
    if (cf) filtered = filtered.filter(c => c.country === cf);
    if (q) filtered = filtered.filter(c =>
        c.company.toLowerCase().includes(q) ||
        c.person.toLowerCase().includes(q) ||
        c.email.toLowerCase().includes(q) ||
        c.tel.includes(q) ||
        c.location.toLowerCase().includes(q) ||
        c.country.toLowerCase().includes(q) ||
        c.title.toLowerCase().includes(q)
    );
    render(filtered);
}

function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    const keys = ['company','person','title','tel','email','location','country','type'];
    const k = keys[col];
    contacts.sort((a, b) => {
        const va = (a[k] || '').toLowerCase();
        const vb = (b[k] || '').toLowerCase();
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
    filter();
    // Update arrow
    document.querySelectorAll('th .arrow').forEach(el => el.textContent = '▼');
    document.querySelectorAll('th')[col].querySelector('.arrow').textContent = sortAsc ? '▲' : '▼';
}

render(contacts);
