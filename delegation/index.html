<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虹运AI魔方 · 委托入口</title>
<style>
:root {
  --bg: #f5f3f0;
  --card: #ffffff;
  --text: #2c2416;
  --text-secondary: #6b5e4a;
  --accent: #c75b2a;
  --accent-light: #fdf0e8;
  --border: #e5ded4;
  --confirmed: #2d6a4f;
  --unconfirmed: #b0893c;
  --missing: #c75b2a;
  --inferred: #5a7d9a;
  --bubble-user: #f0ebe4;
  --bubble-bot: #ffffff;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
.container { display: flex; width: 100%; height: 100vh; }

.chat-panel { width: 480px; min-width: 380px; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: #faf9f7; }
.chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
.chat-header h1 { font-size: 18px; font-weight: 600; }
.chat-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 90%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; animation: fadeIn 0.2s; }
.msg.bot { align-self: flex-start; background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.user { align-self: flex-end; background: var(--bubble-user); border-bottom-right-radius: 4px; }
.msg.system { align-self: center; font-size: 12px; color: var(--text-secondary); background: none; padding: 4px 10px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.chat-input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--card); }
.chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
.chat-input-row textarea { flex:1; border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; resize:none; font-family:inherit; outline:none; }
.chat-input-row textarea:focus { border-color: var(--accent); }
.chat-input-row button { padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
.chat-actions { display: flex; gap: 8px; margin-top: 8px; }
.chat-actions button { font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--text-secondary); cursor: pointer; }
.chat-actions button:hover { border-color: var(--accent); color: var(--accent); }

.grid-panel { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
.grid-panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text-secondary); }
.grid-status { display: flex; gap: 16px; margin-bottom: 16px; font-size: 13px; flex-wrap: wrap; }
.grid-status span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.confirmed { background: var(--confirmed); }
.dot.unconfirmed { background: var(--unconfirmed); }
.dot.missing { background: var(--missing); }
.dot.ai_inferred { background: var(--inferred); }
.grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex: 1; }
.grid-cell { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; box-shadow: var(--shadow); }
.grid-cell h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.grid-cell .dp { font-size: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.grid-cell .dp .label { color: var(--text-secondary); }
.grid-cell .dp .value { font-weight: 500; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.grid-cell .dp.missing .value { color: var(--missing); font-style: italic; }
.grid-cell .dp.confirmed .value { color: var(--confirmed); }
.grid-cell .dp.unconfirmed .value { color: var(--unconfirmed); }
.grid-cell .dp.ai_inferred .value { color: var(--inferred); }

.manual-form { display: none; margin-top: 16px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
.manual-form.active { display: block; }
.manual-form h3 { font-size: 14px; margin-bottom: 12px; }
.manual-form .form-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
.manual-form .form-row label { width: 120px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }
.manual-form .form-row input { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; }
.manual-form button { margin-top: 8px; padding: 8px 20px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }

@media (max-width: 800px) { .container { flex-direction: column; } .chat-panel { width:100%; min-width:auto; height:55vh; } .grid-panel { height:45vh; } }
</style>
</head>
<body>
<div class="container">
  <div class="chat-panel">
    <div class="chat-header"><h1>🤖 虹运AI魔方助手</h1><p>像聊天一样告诉我您的货物信息，我会自动帮您填好所有单据。</p></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea id="userInput" rows="2" placeholder="例如：我要发102吨矿山设备从天津到刚果金Fungurume，DAP条款..."></textarea>
        <button id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
      <div class="chat-actions">
        <button onclick="toggleManualForm()">📝 手动填写</button>
        <button onclick="resetAll()">🔄 重新开始</button>
      </div>
    </div>
  </div>
  <div class="grid-panel">
    <h2>📊 委托数据实时预览</h2>
    <div class="grid-status" id="gridStatus"></div>
    <div class="grid-container" id="gridContainer"></div>
    <div class="manual-form" id="manualForm">
      <h3>手动补充缺失信息</h3>
      <div id="manualFields"></div>
      <button onclick="submitManual()">提交补充</button>
    </div>
  </div>
</div>

<script>
// ========== TFM 数据模型 ==========
var TFM_MODEL = {
  project: {
    trade_term: { field_key:"trade_term", field_label:"贸易条款", priority:1, source_hint:"合同或PI上有，如FOB/CIF/DAP", value:"", confidence:"missing", source:"", confirmed_by:"" },
    cargo_desc: { field_key:"cargo_desc", field_label:"货描", priority:1, source_hint:"品名、HS编码，客户邮件或合同", value:"", confidence:"missing", source:"", confirmed_by:"" },
    packages: { field_key:"packages", field_label:"件数", priority:1, source_hint:"装箱单或客户告知", value:"", confidence:"missing", source:"", confirmed_by:"" },
    gross_weight: { field_key:"gross_weight", field_label:"毛重", priority:1, source_hint:"装箱单或客户告知，单位吨/kg", value:"", confidence:"missing", source:"", confirmed_by:"" },
    volume: { field_key:"volume", field_label:"体积", priority:2, source_hint:"装箱单，单位CBM", value:"", confidence:"missing", source:"", confirmed_by:"" }
  },
  seg1: {
    POL: { field_key:"POL", field_label:"起运港", priority:1, source_hint:"客户告知或合同，如天津港/上海港", value:"", confidence:"missing", source:"", confirmed_by:"" },
    vessel_name: { field_key:"vessel_name", field_label:"船名", priority:1, source_hint:"订舱确认书上有；或问船公司", value:"", confidence:"missing", source:"", confirmed_by:"" },
    voyage: { field_key:"voyage", field_label:"航次", priority:2, source_hint:"订舱确认书上有", value:"", confidence:"missing", source:"", confirmed_by:"" },
    laycan_start: { field_key:"laycan_start", field_label:"Laycan起始日", priority:1, source_hint:"Laycan定了吗？订舱确认书上有", value:"", confidence:"missing", source:"", confirmed_by:"" },
    laycan_end: { field_key:"laycan_end", field_label:"Laycan截止日", priority:2, source_hint:"订舱确认书上有", value:"", confidence:"missing", source:"", confirmed_by:"" },
    cut_off_date: { field_key:"cut_off_date", field_label:"截单时间", priority:1, source_hint:"截单时间知道了吗？船公司会给", value:"", confidence:"missing", source:"", confirmed_by:"" },
    ETD: { field_key:"ETD", field_label:"预计开船日", priority:2, source_hint:"船公司船期表或订舱确认书", value:"", confidence:"missing", source:"", confirmed_by:"" }
  },
  seg2: {
    transship_port: { field_key:"transship_port", field_label:"中转港", priority:2, source_hint:"船公司航线图或订舱确认书", value:"", confidence:"missing", source:"", confirmed_by:"" },
    mother_vessel: { field_key:"mother_vessel", field_label:"母船船名", priority:2, source_hint:"订舱确认书或二程船信息", value:"", confidence:"missing", source:"", confirmed_by:"" },
    ETA_transship: { field_key:"ETA_transship", field_label:"预计到中转港", priority:2, source_hint:"船公司船期表", value:"", confidence:"missing", source:"", confirmed_by:"" }
  },
  seg3: {
    POD: { field_key:"POD", field_label:"目的港", priority:1, source_hint:"客户告知或合同", value:"", confidence:"missing", source:"", confirmed_by:"" },
    delivery_address: { field_key:"delivery_address", field_label:"交货地址", priority:1, source_hint:"客户告知，如Fungurume矿区", value:"", confidence:"missing", source:"", confirmed_by:"" },
    customs_broker: { field_key:"customs_broker", field_label:"清关行", priority:2, source_hint:"收货人或代理在跟；批了吗？", value:"", confidence:"missing", source:"", confirmed_by:"" },
    delivery_deadline: { field_key:"delivery_deadline", field_label:"交货截止日", priority:2, source_hint:"合同或客户要求", value:"", confidence:"missing", source:"", confirmed_by:"" }
  }
};

var GRID_LAYOUT = [
  { title:"项目信息", group:"project", keys:["trade_term","cargo_desc","packages","gross_weight","volume"] },
  { title:"段1·起运", group:"seg1", keys:["POL","vessel_name","voyage","laycan_start","laycan_end","cut_off_date","ETD"] },
  { title:"段2·中转", group:"seg2", keys:["transship_port","mother_vessel","ETA_transship"] },
  { title:"段3·目的港", group:"seg3", keys:["POD","delivery_address","customs_broker","delivery_deadline"] },
  { title:"联系人", group:"contacts", keys:[] },
  { title:"费用/成本", group:"costs", keys:[] },
  { title:"单证", group:"docs", keys:[] },
  { title:"时间线", group:"timeline", keys:[] },
  { title:"备注", group:"notes", keys:[] }
];

var tfmData = null;
var chatHistory = [];
var isProcessing = false;
var API_PROXY = 'https://api-proxy.rainbowway-api.workers.dev/v1/chat/completions';

function init() {
  loadTFMData();
  renderGrid();
  renderGridStatus();
  addBotMessage('您好，我是虹运AI魔方助手。请告诉我您要发的货物信息，像跟人聊天一样说就行。');
}

function loadTFMData() {
  var saved = localStorage.getItem('tfmProject');
  if (saved) { try { tfmData = JSON.parse(saved); } catch(e) { tfmData = null; } }
  if (!tfmData) { tfmData = JSON.parse(JSON.stringify(TFM_MODEL)); saveTFMData(); }
}

function saveTFMData() {
  localStorage.setItem('tfmProject', JSON.stringify(tfmData));
  var co = { shipper:'', consignee:'', notifyParty:'', cargoDesc:tfmData.project.cargo_desc.value||'', packages:tfmData.project.packages.value||'', grossWeight:tfmData.project.gross_weight.value||'', volume:tfmData.project.volume.value||'', tradeTerm:tfmData.project.trade_term.value||'', deliveryDeadline:tfmData.seg3.delivery_deadline.value||'' };
  localStorage.setItem('clientOrder', JSON.stringify(co));
}

function addBotMessage(text) {
  chatHistory.push({role:'assistant', content:text});
  var div = document.createElement('div'); div.className='msg bot'; div.textContent=text;
  document.getElementById('chatMessages').appendChild(div); scrollChat();
}

function addUserMessage(text) {
  chatHistory.push({role:'user', content:text});
  var div = document.createElement('div'); div.className='msg user'; div.textContent=text;
  document.getElementById('chatMessages').appendChild(div); scrollChat();
}

function addSystemMessage(text) {
  var div = document.createElement('div'); div.className='msg system'; div.textContent=text;
  document.getElementById('chatMessages').appendChild(div); scrollChat();
}

function scrollChat() {
  var el = document.getElementById('chatMessages');
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  if (isProcessing) return;
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserMessage(text);
  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;

  var localResult = localExtract(text);
  if (localResult.extracted.length > 0) {
    applyExtractions(localResult.extracted);
    addSystemMessage('✅ 已识别：'+localResult.extracted.map(function(e){return e.label;}).join('、'));
  }

  var needsLLM = (text.length <= 200);
  if (needsLLM) {
    var llmResult = await llmExtract(text);
    if (llmResult && llmResult.length > 0) {
      applyExtractions(llmResult);
      addSystemMessage('✅ 补充识别：'+llmResult.map(function(e){return e.field_label||e.key;}).join('、'));
    }
  }

  loadTFMData();
  renderGrid();
  renderGridStatus();

  var followUps = buildFollowUps();
  if (followUps.length > 0) {
    setTimeout(function(){ addBotMessage(followUps.join('；')+'。'); }, 500);
  } else {
    var missingAny = countMissing();
    if (missingAny > 0) {
      setTimeout(function(){ addBotMessage('信息收得差不多了。还有'+missingAny+'项没填，您可以继续补充，或点"手动填写"补完。'); }, 500);
    } else {
      setTimeout(function(){ addBotMessage('全部信息已收录！数据已自动同步，您可以关闭页面了。'); }, 500);
    }
  }

  updateManualForm();
  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
}

function localExtract(text) {
  if (text.length > 200) { saveTFMData(); return { extracted:[], unmatched:[] }; }
  var extracted = [];

  var portPatterns = [
    { regex:/天津港?|天津|新港|Tianjin|Xingang/i, target:{group:'seg1',key:'POL'}, label:'起运港·天津' },
    { regex:/上海港?|上海|Shanghai/i, target:{group:'seg1',key:'POL'}, label:'起运港·上海' },
    { regex:/青岛港?|青岛|Qingdao/i, target:{group:'seg1',key:'POL'}, label:'起运港·青岛' },
    { regex:/宁波港?|宁波|Ningbo/i, target:{group:'seg1',key:'POL'}, label:'起运港·宁波' },
    { regex:/深圳港?|深圳|蛇口|Shenzhen|Shekou/i, target:{group:'seg1',key:'POL'}, label:'起运港·深圳' },
    { regex:/广州港?|广州|黄埔|Guangzhou/i, target:{group:'seg1',key:'POL'}, label:'起运港·广州' },
    { regex:/德班|Durban/i, target:{group:'seg3',key:'POD'}, label:'目的港·德班' },
    { regex:/蒙巴萨|Mombasa/i, target:{group:'seg3',key:'POD'}, label:'目的港·蒙巴萨' },
    { regex:/达累斯萨拉姆|Dar es Salaam/i, target:{group:'seg3',key:'POD'}, label:'目的港·达累斯萨拉姆' },
    { regex:/马塔迪|Matadi/i, target:{group:'seg3',key:'POD'}, label:'目的港·马塔迪' },
    { regex:/鲸湾港|Walvis Bay/i, target:{group:'seg3',key:'POD'}, label:'目的港·鲸湾港' },
    { regex:/洛比托|Lobito/i, target:{group:'seg3',key:'POD'}, label:'目的港·洛比托' },
    { regex:/新加坡|Singapore/i, target:{group:'seg2',key:'transship_port'}, label:'中转港·新加坡' }
  ];
  for (var i=0; i<portPatterns.length; i++) {
    var p = portPatterns[i];
    if (p.regex.test(text)) {
      var dp = getDataPoint(p.target.group, p.target.key);
      if (dp) {
        dp.value = text.match(p.regex)[0];
        dp.confidence = 'unconfirmed'; dp.source = '对话提取'; dp.confirmed_by = '侦查员';
        extracted.push({group:p.target.group, key:p.target.key, label:p.label});
      }
    }
  }

  var termPatterns = [
    { regex:/DAP|delivered at place/i, value:'DAP' },
    { regex:/FOB|free on board/i, value:'FOB' },
    { regex:/CIF|cost insurance freight/i, value:'CIF' },
    { regex:/CFR|CNF|cost and freight/i, value:'CFR' },
    { regex:/EXW|ex works/i, value:'EXW' },
    { regex:/DDP|delivered duty paid/i, value:'DDP' }
  ];
  for (var j=0; j<termPatterns.length; j++) {
    if (termPatterns[j].regex.test(text)) {
      var tdp = getDataPoint('project','trade_term');
      if (tdp) {
        tdp.value = termPatterns[j].value;
        tdp.confidence = 'confirmed'; tdp.source = '对话提取'; tdp.confirmed_by = '侦查员';
        extracted.push({group:'project', key:'trade_term', label:'贸易条款·'+termPatterns[j].value});
      }
      break;
    }
  }

  var wm = text.match(/(\d+\.?\d*)\s*(吨|t|kg|公斤|千克)/i);
  if (wm) {
    var wdp = getDataPoint('project','gross_weight');
    if (wdp) {
      var num = parseFloat(wm[1]), unit = wm[2].toLowerCase();
      wdp.value = (unit==='kg'||unit==='公斤'||unit==='千克') ? (num/1000)+'吨' : num+'吨';
      wdp.confidence = 'confirmed'; wdp.source = '对话提取'; wdp.confirmed_by = '侦查员';
      extracted.push({group:'project', key:'gross_weight', label:'毛重·'+wdp.value});
    }
  }

  var pm = text.match(/(\d+)\s*(件|箱|包|托|pallet|carton)/i);
  if (pm) {
    var pdp = getDataPoint('project','packages');
    if (pdp) {
      pdp.value = pm[1]+pm[2]; pdp.confidence = 'confirmed'; pdp.source = '对话提取'; pdp.confirmed_by = '侦查员';
      extracted.push({group:'project', key:'packages', label:'件数·'+pdp.value});
    }
  }

  var vm = text.match(/(\d+\.?\d*)\s*(cbm|CBM|方|立方)/);
  if (vm) {
    var vdp = getDataPoint('project','volume');
    if (vdp) {
      vdp.value = vm[1]+'CBM'; vdp.confidence = 'confirmed'; vdp.source = '对话提取'; vdp.confirmed_by = '侦查员';
      extracted.push({group:'project', key:'volume', label:'体积·'+vdp.value});
    }
  }

  var dm = text.match(/(\d{1,2}[月\/\-]\d{1,2})(?:日|号)?/);
  if (dm) {
    var ddp = getDataPoint('seg1','laycan_start');
    if (ddp) {
      ddp.value = dm[0]; ddp.confidence = 'unconfirmed'; ddp.source = '对话提取'; ddp.confirmed_by = '侦查员';
      extracted.push({group:'seg1', key:'laycan_start', label:'Laycan·'+ddp.value});
    }
  }

  if (/Fungurume|卢本巴希|Lubumbashi|科卢韦齐|Kolwezi|Likasi/i.test(text)) {
    var addp = getDataPoint('seg3','delivery_address');
    if (addp) {
      addp.value = text.match(/Fungurume|卢本巴希|Lubumbashi|科卢韦齐|Kolwezi|Likasi/i)[0];
      addp.confidence = 'unconfirmed'; addp.source = '对话提取'; addp.confirmed_by = '侦查员';
      extracted.push({group:'seg3', key:'delivery_address', label:'交货地址·'+addp.value});
    }
  }

  if (/还没定|待确认|在跟|不确定|TBD|TBC/i.test(text)) {
    addSystemMessage('📌 检测到未确定项，已自动标记为缺失');
  }

  loadTFMData();
  return { extracted:extracted, unmatched:[] };
}

async function llmExtract(text) {
  var missingFields = getMissingPriority1();
  if (missingFields.length === 0) return [];
  var fieldList = missingFields.map(function(f){return f.field_key+'('+f.field_label+')';}).join(', ');
  var prompt = '你是货运代理AI助手。从客户的话中提取数据点。\n客户说："'+text+'"\n需要提取的字段：'+fieldList+'\n返回JSON数组：[{"field_key":"...","value":"...","confidence":"confirmed|unconfirmed"}]，提取不到的不要返回，只返回JSON数组。';
  try {
    var resp = await fetch(API_PROXY, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'deepseek-chat', messages:[{role:'user',content:prompt}], temperature:0.1, max_tokens:500})
    });
    var data = await resp.json();
    var content = data.choices?.[0]?.message?.content || '';
    var m = content.match(/\[[\s\S]*\]/);
    if (m) return JSON.parse(m[0]);
  } catch(e) { console.error('LLM提取失败:', e); }
  return [];
}

function applyExtractions(extractions) {
  for (var i=0; i<extractions.length; i++) {
    var ex = extractions[i];
    var dp = getDataPoint(ex.group, ex.key);
    if (dp) {
      if (ex.value) { dp.value = ex.value; }
      dp.confidence = ex.confidence || 'unconfirmed';
      dp.source = dp.source || '对话提取';
      dp.confirmed_by = dp.confirmed_by || '侦查员';
    }
  }
  saveTFMData();
}

function buildFollowUps() {
  var missing = getMissingPriority1();
  if (missing.length === 0) return [];
  var picks = missing.slice(0,3);
  return picks.map(function(p){ return humanizeHint(p); });
}

function humanizeHint(dp) {
  var map = {
    'trade_term': '贸易条款是FOB还是CIF？合同或PI上能看到',
    'cargo_desc': '货物品名和HS编码是什么？',
    'packages': '一共多少件？装箱单上有',
    'gross_weight': '货物总毛重多少吨？装箱单上有',
    'POL': '从哪个港口发货？上海还是天津？',
    'vessel_name': '船名定了吗？订舱确认书上有',
    'laycan_start': 'Laycan定了吗？大概什么时间？',
    'cut_off_date': '截单时间知道了吗？船公司会给',
    'POD': '目的港是哪个？',
    'delivery_address': '最终交货地址在哪？'
  };
  if (map[dp.field_key]) return map[dp.field_key];
  return dp.field_label + '？' + dp.source_hint;
}

function getMissingPriority1() {
  var result = [];
  for (var gn in tfmData) {
    for (var k in tfmData[gn]) {
      var dp = tfmData[gn][k];
      if (dp.priority===1 && (!dp.value || dp.confidence==='missing')) result.push(Object.assign({},dp,{group:gn,field_key:k}));
    }
  }
  return result;
}

function countMissing() {
  var c = 0;
  for (var gn in tfmData) { for (var k in tfmData[gn]) { if (!tfmData[gn][k].value || tfmData[gn][k].confidence==='missing') c++; } }
  return c;
}

function getDataPoint(group, key) { return tfmData?.[group]?.[key] || null; }

function renderGrid() {
  var container = document.getElementById('gridContainer');
  container.innerHTML = '';
  for (var i=0; i<GRID_LAYOUT.length; i++) {
    var cell = GRID_LAYOUT[i];
    var div = document.createElement('div'); div.className = 'grid-cell';
    var html = '<h3>'+cell.title+'</h3>';
    if (cell.keys.length===0 && cell.group==='contacts') html += '<div class="dp"><span class="label" style="color:#999;">客户提交后自动填充</span></div>';
    else if (cell.keys.length===0) html += '<div class="dp"><span class="label" style="color:#999;">待后续版本</span></div>';
    else {
      for (var j=0; j<cell.keys.length; j++) {
        var dp = getDataPoint(cell.group, cell.keys[j]);
        if (dp) {
          var cls = dp.value ? dp.confidence : 'missing';
          var display = dp.value || '—';
          html += '<div class="dp '+cls+'"><span class="label">'+dp.field_label+'</span><span class="value" title="'+display+'">'+display+'</span></div>';
        }
      }
    }
    div.innerHTML = html; container.appendChild(div);
  }
}

function renderGridStatus() {
  var confirmed=0, unconfirmed=0, missing=0, inferred=0;
  for (var gn in tfmData) {
    for (var k in tfmData[gn]) {
      var dp = tfmData[gn][k];
      if (dp.value) { if (dp.confidence==='confirmed') confirmed++; else if (dp.confidence==='ai_inferred') inferred++; else unconfirmed++; }
      else missing++;
    }
  }
  document.getElementById('gridStatus').innerHTML = '<span><span class="dot confirmed"></span> 已确认 '+confirmed+'</span><span><span class="dot unconfirmed"></span> 待确认 '+unconfirmed+'</span><span><span class="dot ai_inferred"></span> AI推断 '+inferred+'</span><span><span class="dot missing"></span> 缺失 '+missing+'</span>';
}

function toggleManualForm() {
  var form = document.getElementById('manualForm');
  form.classList.toggle('active');
  if (form.classList.contains('active')) updateManualForm();
}

function updateManualForm() {
  var container = document.getElementById('manualFields');
  var missing = [];
  for (var gn in tfmData) {
    for (var k in tfmData[gn]) {
      var dp = tfmData[gn][k];
      if (!dp.value || dp.confidence==='missing') missing.push(Object.assign({},dp,{group:gn,field_key:k}));
    }
  }
  container.innerHTML = missing.map(function(m){return '<div class="form-row"><label>'+m.field_label+'</label><input data-group="'+m.group+'" data-key="'+m.field_key+'" placeholder="'+m.source_hint+'" value="'+(m.value||'')+'"></div>';}).join('');
}

function submitManual() {
  var inputs = document.querySelectorAll('#manualFields input');
  inputs.forEach(function(inp){
    var dp = getDataPoint(inp.dataset.group, inp.dataset.key);
    if (dp && inp.value.trim()) { dp.value = inp.value.trim(); dp.confidence = 'unconfirmed'; dp.source = '手动填写'; dp.confirmed_by = '客户'; }
  });
  saveTFMData(); loadTFMData(); renderGrid(); renderGridStatus();
  addSystemMessage('📝 手动补充已保存');
  toggleManualForm();
}

function resetAll() {
  if (!confirm('确定要清除所有已填数据，重新开始吗？')) return;
  localStorage.removeItem('tfmProject'); localStorage.removeItem('clientOrder');
  tfmData = JSON.parse(JSON.stringify(TFM_MODEL)); saveTFMData();
  chatHistory = []; document.getElementById('chatMessages').innerHTML = '';
  renderGrid(); renderGridStatus();
  addBotMessage('已重置。请告诉我您的货物信息。');
}

document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

init();
</script>
