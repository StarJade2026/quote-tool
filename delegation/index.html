<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虹运AI魔方 · 委托入口</title>
<style>
:root {
  --bg: #f5f3f0; --card: #ffffff; --text: #2c2416; --text-secondary: #6b5e4a;
  --accent: #c75b2a; --border: #e5ded4; --confirmed: #2d6a4f; --unconfirmed: #b0893c;
  --missing: #c75b2a; --bubble-user: #f0ebe4; --bubble-bot: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
.container { display: flex; width: 100%; height: 100vh; }
.chat-panel { width: 460px; min-width: 360px; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: #faf9f7; }
.chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
.chat-header h1 { font-size: 18px; font-weight: 600; }
.chat-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 90%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; animation: fadeIn 0.2s; }
.msg.bot { align-self: flex-start; background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.user { align-self: flex-end; background: var(--bubble-user); border-bottom-right-radius: 4px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.chat-input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--card); }
.chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
.chat-input-row textarea { flex:1; border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; resize:none; font-family:inherit; outline:none; }
.chat-input-row textarea:focus { border-color: var(--accent); }
.chat-input-row button { padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }

.grid-panel { flex: 1; overflow-y: auto; padding: 20px; }
.grid-panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
.grid-summary { display: flex; gap: 16px; margin-bottom: 16px; font-size: 13px; flex-wrap: wrap; }
.grid-summary span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.ok { background: var(--confirmed); } .dot.warn { background: var(--unconfirmed); } .dot.miss { background: var(--missing); }
.section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.section h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.section .row { font-size: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; }
.section .row .lbl { color: var(--text-secondary); }
.section .row.warn .val { color: var(--unconfirmed); }
.section .row.miss .val { color: var(--missing); font-style: italic; }
.cargo-table { width:100%; border-collapse:collapse; font-size:11px; margin-top:8px; }
.cargo-table th { background:#f5f3f0; padding:4px; text-align:left; border-bottom:2px solid var(--border); }
.cargo-table td { padding:4px; border-bottom:1px solid var(--border); max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
@media (max-width: 800px) { .container { flex-direction: column; } .chat-panel { width:100%; min-width:auto; height:50vh; } .grid-panel { height:50vh; } }
</style>
</head>
<body>
<div class="container">
<div class="chat-panel">
  <div class="chat-header"><h1>🤖 虹运AI魔方助手</h1><p>告诉我货物信息，我会整理货物清单并做三线投影（内陆/订舱/关务）。确认无误后引导您进入正式报价流程。说错了随时纠正。</p></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <div class="chat-input-row">
      <textarea id="userInput" rows="2" placeholder="例如：6台挖掘机102吨/台，天津到达累斯萨拉姆，DAP..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>
<div class="grid-panel">
  <h2>📊 委托数据实时预览</h2>
  <div class="grid-summary" id="gridSummary"></div>
  <div id="gridContent"></div>
</div>
</div>
<script>
var API = 'https://api-proxy.rainbowway-api.workers.dev/v1/chat/completions';
var project = null;
var chatHistory = [];
var isProcessing = false;
var REQUIRED = ['name','qty','unit','weight_t','trade_term','pol','fuel_electric'];
var FLABEL = { name:'品名',model:'型号',hs_code:'HS编码',qty:'数量',unit:'单位',weight_t:'单件毛重(t)',volume_cbm:'单件体积(CBM)',dimensions_mm:'尺寸(mm)',packaging:'包装',dangerous:'危险品',fuel_electric:'含油含电',trade_term:'贸易条款',pol:'起运港',pod:'目的港',delivery_address:'交货地址',status:'货物状态',special_requirement:'特殊要求' };

function initProject() {
  var s = localStorage.getItem('tfmProject');
  if (s) { try { project = JSON.parse(s); if (!project.cargo_items) project = null; } catch(e) { project = null; } }
  if (!project) { project = { project_id:'TFM'+Date.now().toString(36).toUpperCase(), cargo_items:[], grid:{ inland:{}, booking:{}, customs:{} } }; save(); }
}
function save() { localStorage.setItem('tfmProject', JSON.stringify(project)); }
function addItem(it) { it.item_id = project.cargo_items.length+1; project.cargo_items.push(it); runProjections(); save(); }
function removeItem(id) { project.cargo_items = project.cargo_items.filter(function(x){ return x.item_id!==id; }); for(var i=0;i<project.cargo_items.length;i++)project.cargo_items[i].item_id=i+1; runProjections(); save(); }
function clearItems() { project.cargo_items = []; runProjections(); save(); }

function runProjections() {
  var items = project.cargo_items;
  if (!items.length) { project.grid = { inland:{}, booking:{}, customs:{} }; return; }
  var inland = { total_weight:0, oversize_count:0, fuel_electric_count:0, total_qty:0 };
  var booking = { total_weight:0, total_volume:0, total_qty:0, trade_term:'', pol:'',pols:[], pod:'', dangerous_list:[] };
  var customs = { hs_codes:[], models:[], names:[], need_inspection:false, total_weight:0 };
  for (var i=0; i<items.length; i++) {
    var it = items[i], w = (it.weight_t||0)*(it.qty||1);
    inland.total_weight+=w; inland.total_qty+=(it.qty||0); if(it.oversize)inland.oversize_count++; if(it.fuel_electric)inland.fuel_electric_count++;
    booking.total_weight+=w; booking.total_volume+=(it.volume_cbm||0)*(it.qty||1); booking.total_qty+=(it.qty||0); if(it.trade_term)booking.trade_term=it.trade_term; if(it.pol && booking.pols.indexOf(it.pol)<0)booking.pols.push(it.pol);; if(it.pod)booking.pod=it.pod; if(it.dangerous&&it.dangerous_class&&booking.dangerous_list.indexOf(it.dangerous_class)<0)booking.dangerous_list.push(it.dangerous_class);
    customs.total_weight+=w; if(it.hs_code&&customs.hs_codes.indexOf(it.hs_code)<0)customs.hs_codes.push(it.hs_code); if(it.model&&customs.models.indexOf(it.model)<0)customs.models.push(it.model); if(it.name&&customs.names.indexOf(it.name)<0)customs.names.push(it.name); if(it.dangerous||it.fuel_electric)customs.need_inspection=true;
  }
  project.grid = { inland:inland, booking:booking, customs:customs };
}

function cargoSummary() {
  var items = project.cargo_items;
  if (!items.length) return '暂无';
  return items.map(function(it,i){ return (i+1)+'. '+(it.name||'?')+' '+(it.model||'')+' '+(it.qty||'?')+(it.unit||'台')+' '+(it.weight_t!=null?it.weight_t+'吨/台':'?吨/台'); }).join('\n');
}

function missingFields() {
  var items = project.cargo_items;
  if (!items.length) return '需收集：品名、数量、单件毛重、贸易条款、起运港、是否含油含电';
  var missReq=[], missOpt=[];
  for (var i=0; i<REQUIRED.length; i++) {
    var all=true; for(var j=0;j<items.length;j++){var v=items[j][REQUIRED[i]];if(v!==null&&v!==undefined&&v!==''&&v!==0&&v!==false){all=false;break;}} if(all)missReq.push(FLABEL[REQUIRED[i]]||REQUIRED[i]);
  }
  var opt=['hs_code','pod','delivery_address','packaging','dimensions_mm'];
  for (var k=0; k<opt.length; k++) {
    var all=true; for(var m=0;m<items.length;m++){var v=items[m][opt[k]];if(v!==null&&v!==undefined&&v!==''&&v!==0&&v!==false){all=false;break;}} if(all)missOpt.push(FLABEL[opt[k]]||opt[k]);
  }
  var parts=[];
  if(missReq.length)parts.push('必填缺失：'+missReq.join('、'));
  if(missOpt.length)parts.push('选填缺失：'+missOpt.join('、'));
  return parts.length?parts.join('；'):'基础必填已齐，可补充选填字段';
}

function renderAll() {
  var items = project.cargo_items;
  var summary = document.getElementById('gridSummary');
  var complete=0;
  for(var i=0;i<items.length;i++){var it=items[i],ok=true;for(var j=0;j<REQUIRED.length;j++){var v=it[REQUIRED[j]];if(v===null||v===undefined||v==='')ok=false;}if(ok)complete++;}
  summary.innerHTML = '<span><span class="dot ok"></span> 已填 '+items.length+'</span><span><span class="dot warn"></span> 待确认 '+(items.length-complete)+'</span>';

  var content = document.getElementById('gridContent'), html = '';
  if (items.length > 0) {
    html += '<div class="section"><h3>📦 货物清单</h3><table class="cargo-table"><tr><th>#</th><th>品名</th><th>型号</th><th>数量</th><th>单重(t)</th><th>尺寸</th><th>状态</th><th>含油电</th><th></th></tr>';
    for (var i=0; i<items.length; i++) {
      var it = items[i];
      html += '<tr><td>'+(i+1)+'</td><td>'+(it.name||'—')+'</td><td>'+(it.model||'—')+'</td><td>'+(it.qty||'?')+' '+(it.unit||'')+'</td><td>'+(it.weight_t!=null?it.weight_t:'?')+'</td><td>'+(it.dimensions_mm||'—')+'</td><td>'+(it.status||'—')+'</td><td>'+(it.fuel_electric?'⚠️是':'否')+'</td><td><button onclick="removeItem('+it.item_id+');renderAll();" style="background:none;border:none;color:#c75b2a;cursor:pointer;font-size:14px;">✕</button></td></tr>';
    }
    html += '</table></div>';
    var inland = project.grid.inland, booking = project.grid.booking, customs = project.grid.customs;
    html += '<div class="section"><h3>🚛 内陆线投影</h3>';
    html += '<div class="row"><span class="lbl">总毛重</span><span class="val">'+(inland.total_weight>0?inland.total_weight.toFixed(1)+'吨':'待补充')+'</span></div>';
    html += '<div class="row"><span class="lbl">总件数</span><span class="val">'+(inland.total_qty>0?inland.total_qty:'待补充')+'</span></div>';
    if (inland.oversize_count>0) html += '<div class="row warn"><span class="lbl">超限件数</span><span class="val">'+inland.oversize_count+'件 ⚠️需特种车</span></div>';
        if (inland.fuel_electric_count>0) html += '<div class="row warn" style="background:#fff8e6;border-left:3px solid #b0893c;padding-left:8px;"><span class="lbl">⚠️ 含油含电</span><span class="val">'+inland.fuel_electric_count+'件 需确认油箱排空状态</span></div>';
    if (inland.total_weight>40) html += '<div class="row warn"><span class="lbl">⚠️ 总重超40吨</span><span class="val">需特种运输</span></div>';
    if (inland.total_weight>100) html += '<div class="row" style="background:#fff0ed;border-left:3px solid #c75b2a;padding-left:8px;"><span class="lbl">⛔ 超100吨大件</span><span class="val">需大件方案+护送，提前确认码头吊装能力</span></div>';
    html += '</div><div class="section"><h3>🚢 订舱线投影</h3>';
    html += '<div class="row"><span class="lbl">总毛重</span><span class="val">'+(booking.total_weight>0?booking.total_weight.toFixed(1)+'吨':'待补充')+'</span></div>';
    html += '<div class="row"><span class="lbl">总体积</span><span class="val">'+(booking.total_volume>0?booking.total_volume.toFixed(1)+'CBM':'待补充')+'</span></div>';
    html += '<div class="row"><span class="lbl">总件数</span><span class="val">'+(booking.total_qty>0?booking.total_qty:'待补充')+'</span></div>';
    html += '<div class="row"><span class="lbl">贸易条款</span><span class="val">'+(booking.trade_term||'待补充')+'</span></div>';
    html += '<div class="row"><span class="lbl">起运港</span><span class="val">'+(booking.pols&&booking.pols.length>0?booking.pols.join('、'):'待补充')+'</span></div>';
    html += '<div class="row"><span class="lbl">目的港</span><span class="val">'+(booking.pod||'待补充')+'</span></div>';
    if (booking.dangerous_list.length>0) html += '<div class="row warn"><span class="lbl">⚠️ 危险品等级</span><span class="val">'+booking.dangerous_list.join(', ')+'</span></div>';
    html += '</div><div class="section"><h3>📋 关务线投影</h3>';
    html += '<div class="row"><span class="lbl">HS编码</span><span class="val">'+(customs.hs_codes.length>0?customs.hs_codes.join(', '):'缺失')+'</span></div>';
    html += '<div class="row"><span class="lbl">品名清单</span><span class="val">'+customs.names.join(', ')+'</span></div>';
    html += '<div class="row"><span class="lbl">需商检</span><span class="val">'+(customs.need_inspection?'⚠️是':'否')+'</span></div>';
    html += '</div>';
  } else {
    html += '<div class="section"><h3>等待货物信息</h3><div style="font-size:12px;color:#999;">对话开始后，货物信息会出现在这里</div></div>';
  }
  content.innerHTML = html;
}

// ========== System Prompt 模板 ==========
var SYSTEM_PROMPT = '你是虹运AI魔方助手，专业国际物流货运代理AI。\n\n【核心规则】\n1. 像资深操作一样对话，不是提取数据的管道\n2. 先回应客户表达，再引导补充缺失信息\n3. 用你的货代知识主动提醒风险和注意事项\n4. 带上下文连续对话，记住之前说过的一切\n5. 客户说错了/不是他的货，立刻处理，不要忽略\n6. 【禁止重复追问】客户已确认的信息绝不二次追问。已说"金属的"→不再问材质，已说"免熏蒸"→不再问ISPM15，已说地址→不再问地址。违反此条=最严重的体验事故\n\n【你的货代知识——危险品识别】
以下任一条件触发，标记为敏感货物：
1.含油设备：柴油发动机/液压油/润滑油，油箱未排空=危险品申报
2.含锂电池：电动工具/储能设备/新能源车，需UN38.3+MSDS
3.化工品：液体/粉末/气体类，需危包证+MSDS+技术说明书
4.磁检货物：电机/扬声器/磁铁，需磁检报告
5.压力容器：灭火器/气瓶/制冷剂，需检验证明
必检文件：锂电池→UN38.3+MSDS，化工品→危包证+MSDS+技术说明书(盖章)，磁检→磁检报告，品牌→品牌授权书
踩坑提醒：品牌标识未授权→海关扣货，报关币种不一致→退税受阻，危包证缺失→订舱延误

【你的货代知识——运输常识】
- 公路运输超40吨需特种车，超100吨需大件方案+护送
- 集装箱20GP限重约22吨、40HQ约27吨，超了走散杂船
- DAP=管到目的地交货不含清关，DDP=门到门含清关
- 刚果金矿区常见路线：天津/上海→达累斯萨拉姆→陆运→Fungurume/Lubumbashi/Kolwezi
- 挖掘机/装载机HS编码84章，裸装运输需绑扎固定
- 包装类型影响运输方案：裸装需绑扎/托盘需ISPM15熏蒸/木箱也需ISPM15\n【当前货物状态】\n已有{cargo_items_count}条货物：{cargo_items_summary}\n{missing_fields}\n\n【输出格式】\n返回JSON，不要返回其他内容：\n{"reply":"给客户的对话回复，2-4句话，专业自然","extracted_items":[提取到的货物信息数组，没有则为空数组],"actions":["clear_all"或"delete_item:品名"或"none"]}\n每条extracted_item的字段：name(必填), model, qty, unit, weight_t, volume_cbm, dimensions_mm, packaging, dangerous, dangerous_class, fuel_electric, trade_term, pol, pod, delivery_address, status, hs_code, special_requirement。没有的字段填null，不要虚构。多港起运时（如用户说"上海和天津出"），给每条货物标记pol字段为对应的起运港。';

function buildSystemPrompt() {
  return SYSTEM_PROMPT
    .replace('{cargo_items_count}', project.cargo_items.length)
    .replace('{cargo_items_summary}', cargoSummary())
    .replace('{missing_fields}', missingFields());
}

// ========== 核心：一次LLM调用 ==========
async function chatWithAssistant(text) {
  var sp = buildSystemPrompt();
  var messages = [{ role:'system', content: sp }];
  var start = Math.max(0, chatHistory.length - 20);
  for (var i = start; i < chatHistory.length; i++) messages.push(chatHistory[i]);
  messages.push({ role:'user', content: text });

  var content = '';
  try {
    var resp = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'deepseek-chat', messages:messages, temperature:0.3, max_tokens:4000 }) });
    var data = await resp.json();
    content = data.choices?.[0]?.message?.content || '';
  } catch(e) { content = '{"reply":"抱歉，网络出了问题，请再说一次。","extracted_items":[],"actions":["none"]}'; }

  var result = parseResponse(content);

    if (/不是我的货|删掉|清除|不要这些|不是我的|去掉|不要了|全删|全清|清空/.test(text.toLowerCase())) {
    if (!result.actions || result.actions.indexOf('clear_all') < 0) {
      result.actions = result.actions || [];
      result.actions.push('clear_all');
    }
  }
  if (result.actions) {
    for (var i = 0; i < result.actions.length; i++) executeAction(result.actions[i]);
  }

  var local = localPreFill(text);
  if (local && local.name && result.extracted_items.length > 0) {
    for (var k in local) { if (local[k] !== null && local[k] !== undefined && !result.extracted_items[0][k]) result.extracted_items[0][k] = local[k]; }
  }

  for (var i = 0; i < result.extracted_items.length; i++) {
    if (result.extracted_items[i].name) addItem(result.extracted_items[i]);
  }

  chatHistory.push({ role:'user', content: text });
  chatHistory.push({ role:'assistant', content: result.reply });

  return result;
}

function parseResponse(content) {
  var m = content.match(/\{[\s\S]*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch(e) { console.error('[魔方JSON解析失败]', e.message, '原始内容:', m[0].substring(0,500)); } }
  console.warn('[魔方] AI未返回有效JSON对象，使用降级', content.substring(0,200));
  return { reply: content.replace(/\{[\s\S]*\}/g,'').trim()||'收到，但数据解析出了点问题，请再说一次。', extracted_items:[], actions:['none'] };
}

function executeAction(action) {
  if (action === 'clear_all') { clearItems(); }
  else if (typeof action === 'string' && action.indexOf('delete_item:') === 0) {
    var name = action.replace('delete_item:','');
    for (var i = 0; i < project.cargo_items.length; i++) {
      if (project.cargo_items[i].name && project.cargo_items[i].name.indexOf(name) >= 0) { removeItem(project.cargo_items[i].item_id); break; }
    }
  }
}

function localPreFill(text) {
  var item = {}, found = false;
  var tp = text.match(/DAP|FOB|CIF|CFR|CNF|EXW|DDP/i); if(tp){item.trade_term=tp[0].toUpperCase();found=true;}
  var pp = text.match(/天津港?|天津|上海港?|上海|青岛港?|青岛|宁波港?|宁波|深圳港?|深圳|蛇口|广州港?|广州|黄埔/i); if(pp){item.pol=pp[0];found=true;}
  var dp = text.match(/德班|蒙巴萨|达累斯萨拉姆|马塔迪|鲸湾港|洛比托/i); if(dp){item.pod=dp[0];found=true;}
  var ad = text.match(/Fungurume|卢本巴希|Lubumbashi|科卢韦齐|Kolwezi|Likasi/i); if(ad){item.delivery_address=ad[0];found=true;}
  var wm = text.match(/(\d+\.?\d*)\s*(吨|t|kg|公斤|千克)/i); if(wm){var n=parseFloat(wm[1]),u=wm[2].toLowerCase();item.weight_t=(u==='kg'||u==='公斤'||u==='千克')?n/1000:n;found=true;}
  if(/含油|带电|柴油|汽油/i.test(text)){item.fuel_electric=true;found=true;}
  if(/现货|排产|在途/i.test(text)){var sm=text.match(/现货|排产|在途/i);if(sm){item.status=sm[0];found=true;}}
  return found?item:null;
}

// ========== 对话 ==========
function addMsg(role, text) {
  var d = document.createElement('div'); d.className = 'msg '+(role==='user'?'user':'bot'); d.textContent = text;
  document.getElementById('chatMessages').appendChild(d);
  var el = document.getElementById('chatMessages'); el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  if (isProcessing) return;
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);
  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;

  var result = await chatWithAssistant(text);
  renderAll();
  addMsg('assistant', result.reply);

  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
}

document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
